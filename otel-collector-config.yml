receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 5000
    send_batch_max_size: 10000

exporters:
  otlp/elastic:
    endpoint: "apm-server:8200"
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/elastic, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/elastic, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/elastic, debug]
  telemetry:
    logs:
      level: info
