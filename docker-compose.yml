services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: obs-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=obs-demo
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - obs-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: obs-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - xpack.encryptedSavedObjects.encryptionKey=a]3~#{[}=Fn7x4c^>Cb6Gv7Zz8J5Lm2Rp9Tq1Ws
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'available'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - obs-network

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.17.0
    container_name: obs-apm-server
    environment:
      - output.elasticsearch.hosts=["http://elasticsearch:9200"]
      - apm-server.host="0.0.0.0:8200"
      - setup.kibana.host="http://kibana:5601"
      - setup.template.settings.index.number_of_replicas=0
      - xpack.fleet.enabled=false
    ports:
      - "8200:8200"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - obs-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: obs-otel-collector
    command: ["--config=/etc/otelcol-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - obs-network

  app:
    build:
      context: ./src
      dockerfile: MvpDemo.Service/Dockerfile
    container_name: obs-mvp-demo-app
    environment:
      - ASPNETCORE_ENVIRONMENT=Demo
      - ASPNETCORE_URLS=http://+:8080
      - Otel__OtlpEndpoint=http://otel-collector:4317
      - Otel__OtlpHttpEndpoint=http://otel-collector:4318
      - ServiceName=mvp-demo-service
      - ServiceVersion=1.0.0
    ports:
      - "5080:8080"
    depends_on:
      otel-collector:
        condition: service_started
      kafka-setup:
        condition: service_completed_successfully
    networks:
      - obs-network

  kibana-setup:
    image: curlimages/curl:latest
    container_name: obs-kibana-setup
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ./kibana/dashboards.ndjson:/tmp/dashboards.ndjson:ro
    networks:
      - obs-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo 'Waiting for Kibana to be fully ready...'
        sleep 10
        echo 'Importing Kibana dashboards...'
        curl -X POST "http://kibana:5601/api/saved_objects/_import?overwrite=true" \
          -H "kbn-xsrf: true" \
          -F file=@/tmp/dashboards.ndjson
        echo ''
        echo 'Dashboard import complete!'

  load-generator:
    image: curlimages/curl:latest
    container_name: obs-load-generator
    depends_on:
      - app
    volumes:
      - ./scripts/load-generator.sh:/tmp/load-generator.sh:ro
    networks:
      - obs-network
    entrypoint: ["/bin/sh", "/tmp/load-generator.sh"]
    profiles:
      - load-test

  redis:
    image: redis:alpine
    container_name: obs-redis
    ports:
      - "6379:6379"
    networks:
      - obs-network

  mongo:
    image: mongo:latest
    container_name: obs-mongo
    ports:
      - "27017:27017"
    networks:
      - obs-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: obs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - obs-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: obs-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - obs-network

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    container_name: obs-kafka-setup
    depends_on:
      - kafka
    command: "bash -c 'echo Waiting for Kafka to be ready... && \
                       cub kafka-ready -b kafka:9092 1 20 && \
                       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic test-topic'"
    networks:
      - obs-network

volumes:
  es-data:
    driver: local

networks:
  obs-network:
    driver: bridge
